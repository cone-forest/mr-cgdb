<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>mr-cgdb</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #111; color: #eee; }
    header { padding: 10px 14px; border-bottom: 1px solid #333; position: sticky; top: 0; background: #111; z-index: 10; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .brand { font-weight: 700; font-size: 18px; margin-right: 8px; }
    select, input, textarea, button { background: #1a1a1a; color: #eee; border: 1px solid #444; border-radius: 6px; padding: 7px 9px; }
    button { cursor: pointer; background: #222; }
    button:hover { background: #2a2a2a; }
    main { padding: 14px; max-width: 1200px; }
    .hidden { display: none !important; }
    .panel { border: 1px solid #333; border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
    .panel .title { background: #1a1a1a; padding: 10px 12px; font-weight: 700; display: flex; align-items: center; justify-content: space-between; }
    .panel .body { padding: 12px; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
    .muted { color: #b7b7b7; font-size: 13px; }
    .list { display: grid; gap: 10px; }
    .paper { border: 1px solid #2a2a2a; border-radius: 8px; padding: 10px; }
    .paper h3 { margin: 0 0 6px 0; font-size: 16px; }
    .paper h3 a { color: #9ec5ff; text-decoration: none; }
    .paper h3 a:hover { text-decoration: underline; }
    .summary { white-space: pre-wrap; max-height: 180px; overflow: auto; color: #ddd; margin: 8px 0; }
    .tags { color: #9bd6ff; font-size: 12px; }
    .badge { font-size: 12px; color: #c7d9ff; }
    .modalBg { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; padding: 16px; }
    .modal { width: min(680px, 100%); background: #121212; border: 1px solid #333; border-radius: 10px; padding: 12px; }
    .modal textarea { width: 100%; min-height: 90px; }
    .modal input { width: 100%; }
    .status { color: #c7d9ff; font-size: 13px; }
    #profileCreateBody textarea { width: 100%; min-height: 90px; }
    #profileCreateBody input { min-width: 220px; }
  </style>
</head>
<body>
  <header>
    <div class="brand">Paper Profiles</div>
    <select id="profileSelect" class="hidden"></select>
    <button id="candidateTabBtn" class="hidden">Candidate Papers</button>
    <button id="relevantTabBtn" class="hidden">Relevant</button>
    <button id="publicTabBtn">Public Profiles</button>
    <button id="authTabBtn">Auth</button>
    <button id="logoutBtn" class="hidden">Logout</button>
    <span id="authState" class="status"></span>
  </header>

  <main>
    <section id="authView">
      <div class="panel">
        <div class="title">Auth</div>
        <div class="body">
          <div class="row">
            <input id="regUsername" placeholder="username" autocomplete="off" />
            <input id="regPassword" type="password" placeholder="password (min 8 chars)" autocomplete="new-password" />
            <button id="regBtn">Register</button>
          </div>
          <div class="row">
            <input id="loginUsername" placeholder="username" autocomplete="off" />
            <input id="loginPassword" type="password" placeholder="password" autocomplete="current-password" />
            <button id="loginBtn">Login</button>
          </div>
          <div id="authStatus" class="muted"></div>
        </div>
      </div>
    </section>

    <section id="candidateView" class="hidden">
      <div class="panel">
        <div class="title">
          <span>Candidate Papers</span>
          <span class="row">
            <button id="reloadCandidatesBtn">Reload</button>
            <select id="adminMetricsFilter" class="hidden">
              <option value="all">Metrics: All</option>
              <option value="keyword">Metrics: Keyword Pass</option>
              <option value="llm">Metrics: LLM Relevant</option>
              <option value="auto">Metrics: Would Auto-Download</option>
            </select>
          </span>
        </div>
        <div class="body">
          <div class="muted" id="candidateStatus"></div>
          <div id="candidateList" class="list"></div>
        </div>
      </div>
    </section>

    <section id="relevantView" class="hidden">
      <div class="panel">
        <div class="title">Relevant Papers</div>
        <div class="body">
          <div class="row">
            <input id="relevantTagFilter" placeholder="filter by tag" />
            <button id="reloadRelevantBtn">Reload</button>
          </div>
          <div id="relevantList" class="list"></div>
        </div>
      </div>
    </section>

    <section id="publicView" class="hidden">
      <div class="panel">
        <div class="title">Public Profiles</div>
        <div class="body">
          <div class="row">
            <input id="publicSearchQ" placeholder="search profiles" style="min-width: 320px;" />
            <button id="publicSearchBtn">Search</button>
          </div>
          <div id="publicProfilesList" class="list"></div>
        </div>
      </div>
    </section>

    <section id="myProfilesView" class="hidden">
      <div class="panel">
        <div class="title">
          <span>Create Profile</span>
          <button id="toggleCreateProfileBtn">Show</button>
        </div>
        <div class="body hidden" id="profileCreateBody">
          <div class="row">
            <input id="newProfileSlug" autocomplete="off" placeholder="slug (immutable)" />
            <input id="newProfileName" autocomplete="off" placeholder="display name" />
            <select id="newProfileVisibility"><option value="private">private</option><option value="public">public</option></select>
          </div>
          <div class="row">
            <button id="createProfileBtn">Create Profile</button>
            <span id="createProfileStatus" class="status"></span>
          </div>
          <textarea id="newProfileDescription" autocomplete="off" placeholder="description"></textarea>
          <textarea id="newProfilePos" autocomplete="off" placeholder="positive keywords (one per line)"></textarea>
          <textarea id="newProfileNeg" autocomplete="off" placeholder="negative title keywords (one per line)"></textarea>
          <textarea id="newProfilePrompt" autocomplete="off" placeholder="LLM prompt"></textarea>
          <textarea id="newProfileSources" autocomplete="off" placeholder="sources, one per line: rss:https://... or arxiv_query:search_query=..."></textarea>
        </div>
      </div>
    </section>
  </main>

  <div id="relevantModalBg" class="modalBg">
    <div class="modal">
      <h3 id="relevantModalTitle">Add to Relevant</h3>
      <div class="row"><input id="relevantTagsInput" placeholder="tags comma-separated" /></div>
      <div class="row"><textarea id="relevantNoteInput" placeholder="comment"></textarea></div>
      <div class="row">
        <button id="confirmRelevantBtn">Add to Relevant</button>
        <button id="cancelRelevantBtn">Cancel</button>
      </div>
      <div id="relevantModalStatus" class="muted"></div>
    </div>
  </div>

<script>
const authState = document.getElementById("authState");
const authView = document.getElementById("authView");
const candidateView = document.getElementById("candidateView");
const relevantView = document.getElementById("relevantView");
const publicView = document.getElementById("publicView");
const myProfilesView = document.getElementById("myProfilesView");
const profileSelect = document.getElementById("profileSelect");
const adminMetricsFilter = document.getElementById("adminMetricsFilter");
let auth = { authenticated: false, user: null, csrfToken: "" };
let profiles = [];
let activeProfileId = null;
let pendingRelevantPaper = null;

function showView(name) {
  authView.classList.toggle("hidden", name !== "auth");
  candidateView.classList.toggle("hidden", name !== "candidates");
  relevantView.classList.toggle("hidden", name !== "relevant");
  publicView.classList.toggle("hidden", name !== "public");
  myProfilesView.classList.toggle("hidden", !auth.authenticated);
}

async function api(url, opts = {}) {
  const headers = { ...(opts.headers || {}) };
  if (opts.body && !headers["Content-Type"]) headers["Content-Type"] = "application/json";
  if (auth.authenticated && ["POST","PATCH","PUT","DELETE"].includes((opts.method || "GET").toUpperCase())) {
    headers["X-CSRF-Token"] = auth.csrfToken || "";
  }
  const r = await fetch(url, { ...opts, headers });
  const t = await r.text();
  let d = {};
  try { d = t ? JSON.parse(t) : {}; } catch (_) { d = { raw: t }; }
  if (!r.ok) throw new Error(d.error || d.raw || r.statusText);
  return d;
}

function resetCreateProfileForm() {
  for (const id of ["newProfileSlug","newProfileName","newProfileDescription","newProfilePos","newProfileNeg","newProfilePrompt","newProfileSources"]) {
    document.getElementById(id).value = "";
  }
}

async function refreshAuth() {
  const me = await api("/api/auth/me");
  auth = me || { authenticated: false };
  document.getElementById("logoutBtn").classList.toggle("hidden", !auth.authenticated);
  document.getElementById("candidateTabBtn").classList.toggle("hidden", !auth.authenticated);
  document.getElementById("relevantTabBtn").classList.toggle("hidden", !auth.authenticated);
  profileSelect.classList.toggle("hidden", !auth.authenticated);
  authState.textContent = auth.authenticated ? `Signed in as ${auth.user.username}` : "Not signed in";
  adminMetricsFilter.classList.toggle("hidden", !(auth.authenticated && auth.user && auth.user.isAdmin));
  if (auth.authenticated) await reloadProfiles();
}

async function reloadProfiles() {
  const data = await api("/api/profiles/me");
  profiles = (data.items || []).map(x => x.profile);
  profileSelect.innerHTML = "";
  for (const p of profiles) {
    const o = document.createElement("option");
    o.value = String(p.id);
    o.textContent = `${p.name} (${p.visibility})`;
    profileSelect.appendChild(o);
  }
  if (profiles.length === 0) {
    activeProfileId = null;
    return;
  }
  const saved = localStorage.getItem("activeProfileId");
  const found = profiles.find(p => String(p.id) === String(saved)) || profiles[0];
  profileSelect.value = String(found.id);
  activeProfileId = found.id;
  await touchProfileAccess(activeProfileId);
  await reloadCandidates();
  await reloadRelevant();
}

async function touchProfileAccess(profileId) {
  if (!profileId) return;
  await api(`/api/profiles/${profileId}/access`, { method: "POST", body: "{}" });
  localStorage.setItem("activeProfileId", String(profileId));
}

profileSelect.onchange = async () => {
  activeProfileId = Number(profileSelect.value || 0);
  await touchProfileAccess(activeProfileId);
  await reloadCandidates();
  await reloadRelevant();
};

document.getElementById("authTabBtn").onclick = () => showView("auth");
document.getElementById("candidateTabBtn").onclick = async () => { showView("candidates"); await reloadCandidates(); };
document.getElementById("relevantTabBtn").onclick = async () => { showView("relevant"); await reloadRelevant(); };
document.getElementById("publicTabBtn").onclick = async () => { showView("public"); await reloadPublicProfiles(); };
document.getElementById("logoutBtn").onclick = async () => {
  try { await api("/api/auth/logout", { method: "POST", body: "{}" }); } catch (_) {}
  auth = { authenticated: false, user: null, csrfToken: "" };
  showView("auth");
  await refreshAuth();
};

document.getElementById("regBtn").onclick = async () => {
  const username = document.getElementById("regUsername").value.trim();
  const password = document.getElementById("regPassword").value;
  const status = document.getElementById("authStatus");
  status.textContent = "Registering...";
  try {
    await api("/api/auth/register", { method: "POST", body: JSON.stringify({ username, password }) });
    await refreshAuth();
    showView("candidates");
    status.textContent = "Registered.";
  } catch (e) { status.textContent = `Failed: ${e.message}`; }
};

document.getElementById("loginBtn").onclick = async () => {
  const username = document.getElementById("loginUsername").value.trim();
  const password = document.getElementById("loginPassword").value;
  const status = document.getElementById("authStatus");
  status.textContent = "Logging in...";
  try {
    await api("/api/auth/login", { method: "POST", body: JSON.stringify({ username, password }) });
    await refreshAuth();
    showView("candidates");
    status.textContent = "Logged in.";
  } catch (e) { status.textContent = `Failed: ${e.message}`; }
};

const toggleCreateProfileBtn = document.getElementById("toggleCreateProfileBtn");
const profileCreateBody = document.getElementById("profileCreateBody");
toggleCreateProfileBtn.onclick = () => {
  const hidden = profileCreateBody.classList.toggle("hidden");
  toggleCreateProfileBtn.textContent = hidden ? "Show" : "Hide";
};

document.getElementById("createProfileBtn").onclick = async () => {
  const payload = {
    slug: document.getElementById("newProfileSlug").value.trim(),
    name: document.getElementById("newProfileName").value.trim(),
    description: document.getElementById("newProfileDescription").value.trim(),
    visibility: document.getElementById("newProfileVisibility").value,
    config: {
      positiveKeywords: lines(document.getElementById("newProfilePos").value),
      negativeTitleKeywords: lines(document.getElementById("newProfileNeg").value),
      llmPrompt: `You are a strict classifier for this profile. Given title and abstract, respond with JSON only: {"relevant":true} when clearly relevant, otherwise {"relevant":false}.`,
      sources: parseSources(document.getElementById("newProfileSources").value)
    }
  };
  const status = document.getElementById("createProfileStatus");
  status.textContent = "Creating...";
  try {
    await api("/api/profiles", { method: "POST", body: JSON.stringify(payload) });
    resetCreateProfileForm();
    await reloadProfiles();
    showView("candidates");
    status.textContent = "Created.";
  } catch (e) { status.textContent = `Failed: ${e.message}`; }
};

document.getElementById("reloadCandidatesBtn").onclick = reloadCandidates;
adminMetricsFilter.onchange = reloadCandidates;

async function reloadCandidates() {
  const status = document.getElementById("candidateStatus");
  const list = document.getElementById("candidateList");
  list.innerHTML = "";
  if (!activeProfileId) { status.textContent = "Create/select a profile first."; return; }
  status.textContent = "Loading candidates...";
  const mode = adminMetricsFilter.value || "all";
  const q = new URLSearchParams({
    keywordOnly: String(mode === "keyword"),
    llmRelevantOnly: String(mode === "llm"),
    wouldAutoOnly: String(mode === "auto")
  });
  try {
    const data = await api(`/api/profiles/${activeProfileId}/analysis/candidates?` + q.toString());
    for (const p of (data.items || [])) {
      const el = document.createElement("div");
      el.className = "paper";
      const url = p.url || "#";
      el.innerHTML = `
        <h3><a href="${esc(url)}" target="_blank" rel="noopener noreferrer">${esc(p.title || ("Paper #" + p.paperId))}</a></h3>
        <div class="muted">${esc(String(p.year || "Unknown"))} · ${esc(p.firstAuthor || "Unknown")}</div>
        <div class="summary">${esc((p.abstract || "").slice(0, 3000))}</div>
        <div class="row">
          <button data-a="pdf">Download PDF</button>
          <button data-a="relevant">Add to Relevant</button>
        </div>
        <div class="badge ${auth.user && auth.user.isAdmin ? "" : "hidden"}">
          keywordPass=${p.keywordPass} · llmRelevant=${p.llmRelevant === null || p.llmRelevant === undefined ? "n/a" : p.llmRelevant} · shadowScore=${Number(p.shadowScore || 0).toFixed(3)} · wouldAutoDownload=${p.shadowWouldAutoDownload}
        </div>
      `;
      el.querySelector("button[data-a='pdf']").onclick = () => {
        window.open(buildPDFURL(url), "_blank");
      };
      el.querySelector("button[data-a='relevant']").onclick = () => openRelevantModal(p);
      list.appendChild(el);
    }
    status.textContent = `Loaded ${data.items ? data.items.length : 0} candidates.`;
  } catch (e) {
    status.textContent = `Failed: ${e.message}`;
  }
}

document.getElementById("reloadRelevantBtn").onclick = reloadRelevant;
document.getElementById("relevantTagFilter").onchange = reloadRelevant;

async function reloadRelevant() {
  const list = document.getElementById("relevantList");
  list.innerHTML = "";
  if (!activeProfileId) return;
  const tag = document.getElementById("relevantTagFilter").value.trim();
  const data = await api(`/api/profiles/${activeProfileId}/likes?tag=${encodeURIComponent(tag)}`);
  for (const p of (data.items || [])) {
    const el = document.createElement("div");
    el.className = "paper";
    el.innerHTML = `
      <h3><a href="${esc(p.url || "#")}" target="_blank">${esc(p.title)}</a></h3>
      <div class="summary">${esc((p.abstract || "").slice(0, 1200))}</div>
      <div class="muted">${esc(p.note || "")}</div>
      <div class="tags">${(p.tags || []).map(t => "#" + esc(t)).join(" ")}</div>
      <div class="row">
        <button data-a="pdf">Download PDF</button>
        <button data-a="remove">Remove from Relevant</button>
      </div>
    `;
    el.querySelector("button[data-a='pdf']").onclick = () => window.open(`/api/public/papers/${p.id}/pdf`, "_blank");
    el.querySelector("button[data-a='remove']").onclick = async () => {
      await api(`/api/profiles/${activeProfileId}/likes/${p.id}`, { method: "DELETE", body: "{}" });
      await reloadRelevant();
    };
    list.appendChild(el);
  }
}

async function reloadPublicProfiles() {
  const q = document.getElementById("publicSearchQ").value.trim();
  const data = await api(`/api/public/profiles?q=${encodeURIComponent(q)}`);
  const list = document.getElementById("publicProfilesList");
  list.innerHTML = "";
  for (const p of (data.items || [])) {
    const el = document.createElement("div");
    el.className = "paper";
    el.innerHTML = `
      <h3>${esc(p.name)} <span class="muted">/u/${esc(p.username)}/${esc(p.slug)}</span></h3>
      <div class="muted">${esc(p.description || "")}</div>
      <button data-a="open">Open</button>
    `;
    el.querySelector("button[data-a='open']").onclick = () => window.open(`/api/public/u/${encodeURIComponent(p.username)}/${encodeURIComponent(p.slug)}`, "_blank");
    list.appendChild(el);
  }
}
document.getElementById("publicSearchBtn").onclick = reloadPublicProfiles;

const modalBg = document.getElementById("relevantModalBg");
function openRelevantModal(paper) {
  pendingRelevantPaper = paper;
  document.getElementById("relevantModalTitle").textContent = `Add to Relevant: ${paper.title || ("Paper #" + paper.paperId)}`;
  document.getElementById("relevantTagsInput").value = "";
  document.getElementById("relevantNoteInput").value = "";
  document.getElementById("relevantModalStatus").textContent = "";
  modalBg.style.display = "flex";
}
document.getElementById("cancelRelevantBtn").onclick = () => { modalBg.style.display = "none"; };
document.getElementById("confirmRelevantBtn").onclick = async () => {
  if (!pendingRelevantPaper || !activeProfileId) return;
  const tags = (document.getElementById("relevantTagsInput").value || "").split(",").map(v => v.trim()).filter(Boolean);
  const note = (document.getElementById("relevantNoteInput").value || "").trim();
  const status = document.getElementById("relevantModalStatus");
  status.textContent = "Adding...";
  try {
    await api(`/api/profiles/${activeProfileId}/likes`, {
      method: "POST",
      body: JSON.stringify({ paperId: pendingRelevantPaper.paperId, tags, note })
    });
    status.textContent = "Added to Relevant.";
    modalBg.style.display = "none";
    await reloadRelevant();
  } catch (e) {
    status.textContent = `Failed: ${e.message}`;
  }
};

function parseSources(s) {
  const out = [];
  for (const line of lines(s)) {
    const i = line.indexOf(":");
    if (i <= 0) continue;
    const t = line.slice(0, i).trim();
    const v = line.slice(i + 1).trim();
    if (!v) continue;
    out.push({ sourceType: t, sourceValue: v, enabled: true });
  }
  return out;
}
function lines(s) { return String(s || "").split("\n").map(v => v.trim()).filter(Boolean); }
function esc(s) { return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c])); }
function buildPDFURL(url) {
  const raw = String(url || "").trim();
  if (!raw) return "#";
  if (raw.toLowerCase().endsWith(".pdf")) return raw;
  if (raw.includes("arxiv.org/abs/")) return raw.replace("arxiv.org/abs/", "arxiv.org/pdf/") + ".pdf";
  return raw;
}

resetCreateProfileForm();
refreshAuth()
  .then(async () => {
    if (auth.authenticated) showView("candidates");
    else showView("auth");
    await reloadPublicProfiles();
  })
  .catch(() => showView("auth"));
</script>
</body>
</html>
