<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>mr-cgdb</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #111; color: #eee; }
    header { padding: 12px 16px; border-bottom: 1px solid #333; position: sticky; top: 0; background: #111; }
    h1 { margin: 0; font-size: 20px; }
    .tabs { margin-top: 8px; display: flex; gap: 8px; }
    .feedsbar { margin-top: 10px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .feedsbar input { background: #1a1a1a; color: #eee; border: 1px solid #444; border-radius: 6px; padding: 6px 8px; min-width: 320px; }
    .feeds-panel { margin-top: 8px; border: 1px solid #333; border-radius: 8px; padding: 10px; max-width: 900px; }
    .feeds-panel ul { margin: 8px 0 0 20px; padding: 0; }
    .scanbar { margin-top: 10px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .scanbar input { background: #1a1a1a; color: #eee; border: 1px solid #444; border-radius: 6px; padding: 6px 8px; }
    .scan-status { color: #b7b7b7; font-size: 13px; }
    button { background: #222; color: #eee; border: 1px solid #444; border-radius: 6px; padding: 6px 10px; cursor: pointer; }
    button.active { background: #2f4f7a; }
    main { padding: 16px; }
    .hidden { display: none; }
    .window { border: 1px solid #333; border-radius: 8px; margin-bottom: 14px; overflow: hidden; }
    .window > .title { background: #1a1a1a; padding: 10px 12px; font-weight: 700; }
    .paper { border-top: 1px solid #2a2a2a; padding: 10px 12px; }
    .paper h3 { margin: 0 0 6px 0; font-size: 16px; }
    .paper h3 a { color: #9ec5ff; text-decoration: none; }
    .paper h3 a:hover { text-decoration: underline; }
    .meta { color: #b7b7b7; font-size: 13px; margin-bottom: 8px; }
    .summary { color: #ddd; white-space: pre-wrap; max-height: 180px; overflow: auto; margin-bottom: 8px; }
    .actions { display: flex; gap: 8px; }
    .deep-result { margin-top: 6px; color: #c7d9ff; font-size: 13px; }
    .collapsed .summary, .collapsed .actions { display: none; }
  </style>
</head>
<body>
  <header>
    <h1>Paper Router</h1>
    <div class="tabs">
      <button id="tabDigest" class="active">Digest</button>
      <button id="tabPending">Pending</button>
    </div>
    <div class="scanbar">
      <span>Scan arXiv range:</span>
      <input id="scanFrom" type="date" />
      <input id="scanTo" type="date" />
      <button id="scanBtn">Scan</button>
      <button id="clearBtn">Clear</button>
      <span id="scanStatus" class="scan-status"></span>
    </div>
    <div class="feedsbar">
      <button id="toggleFeedsBtn">Show RSS feeds</button>
      <input id="newFeedUrl" type="url" placeholder="https://example.com/rss.xml" />
      <button id="addFeedBtn">Add RSS feed</button>
      <span id="feedStatus" class="scan-status"></span>
    </div>
    <div id="feedsPanel" class="feeds-panel hidden">
      <strong>Configured RSS feeds</strong>
      <ul id="feedsList"></ul>
    </div>
  </header>
  <main>
    <section id="digestView"></section>
    <section id="pendingView" class="hidden"></section>
  </main>
<script>
const digestView = document.getElementById("digestView");
const pendingView = document.getElementById("pendingView");
const tabDigest = document.getElementById("tabDigest");
const tabPending = document.getElementById("tabPending");
const scanFrom = document.getElementById("scanFrom");
const scanTo = document.getElementById("scanTo");
const scanBtn = document.getElementById("scanBtn");
const clearBtn = document.getElementById("clearBtn");
const scanStatus = document.getElementById("scanStatus");
const toggleFeedsBtn = document.getElementById("toggleFeedsBtn");
const addFeedBtn = document.getElementById("addFeedBtn");
const newFeedUrl = document.getElementById("newFeedUrl");
const feedStatus = document.getElementById("feedStatus");
const feedsPanel = document.getElementById("feedsPanel");
const feedsList = document.getElementById("feedsList");
const collapsed = new Set(JSON.parse(localStorage.getItem("collapsedIrrelevant") || "[]"));
const deepState = new Map(); // paperId -> { status: "idle|running|done|error", message: string }
let deepVerifyInFlight = 0;

tabDigest.onclick = () => showTab("digest");
tabPending.onclick = () => showTab("pending");

const today = new Date();
const weekAgo = new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000);
scanTo.value = toDateInput(today);
scanFrom.value = toDateInput(weekAgo);
scanBtn.onclick = async () => {
  const from = scanFrom.value;
  const to = scanTo.value;
  if (!from || !to) {
    scanStatus.textContent = "Select both dates.";
    return;
  }
  scanBtn.disabled = true;
  scanStatus.textContent = "Scanning...";
  try {
    const res = await post("/api/scan/arxiv-range", { from, to });
    scanStatus.textContent = `Done: fetched ${res.fetched}, forwarded ${res.forwarded}.`;
    await reload();
  } catch (e) {
    scanStatus.textContent = `Scan failed: ${String(e.message || e)}`;
  } finally {
    scanBtn.disabled = false;
  }
};
clearBtn.onclick = async () => {
  const ok = window.confirm("Are you sure you want to clear all scanned papers and pending/digest data? RSS feed list will be kept.");
  if (!ok) return;
  clearBtn.disabled = true;
  scanStatus.textContent = "Clearing data...";
  try {
    await post("/api/scan/clear", {});
    scanStatus.textContent = "Scan data cleared.";
    collapsed.clear();
    saveCollapsed();
    await reload();
  } catch (e) {
    scanStatus.textContent = `Clear failed: ${String(e.message || e)}`;
  } finally {
    clearBtn.disabled = false;
  }
};

toggleFeedsBtn.onclick = async () => {
  const hidden = feedsPanel.classList.toggle("hidden");
  toggleFeedsBtn.textContent = hidden ? "Show RSS feeds" : "Hide RSS feeds";
  if (!hidden) {
    await reloadFeeds();
  }
};

addFeedBtn.onclick = async () => {
  const url = (newFeedUrl.value || "").trim();
  if (!url) {
    feedStatus.textContent = "Enter feed URL.";
    return;
  }
  addFeedBtn.disabled = true;
  feedStatus.textContent = "Adding feed...";
  try {
    await post("/api/rss-feeds", { url });
    newFeedUrl.value = "";
    feedStatus.textContent = "Feed added.";
    if (!feedsPanel.classList.contains("hidden")) {
      await reloadFeeds();
    }
  } catch (e) {
    feedStatus.textContent = `Failed: ${String(e.message || e)}`;
  } finally {
    addFeedBtn.disabled = false;
  }
};
function showTab(t) {
  const isDigest = t === "digest";
  digestView.classList.toggle("hidden", !isDigest);
  pendingView.classList.toggle("hidden", isDigest);
  tabDigest.classList.toggle("active", isDigest);
  tabPending.classList.toggle("active", !isDigest);
}

async function post(url, body) {
  const r = await fetch(url, { method: "POST", headers: { "Content-Type":"application/json" }, body: JSON.stringify(body) });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

function saveCollapsed() {
  localStorage.setItem("collapsedIrrelevant", JSON.stringify(Array.from(collapsed)));
}

function cardForDigest(p) {
  const el = document.createElement("div");
  el.className = "paper";
  if (collapsed.has(String(p.id))) el.classList.add("collapsed");
  const author = p.firstAuthor || "Unknown author";
  const year = p.year || "Unknown year";
  const href = p.url || "#";
  el.innerHTML = `
    <h3><a href="${escapeAttr(href)}" target="_blank" rel="noopener noreferrer">${escapeHTML(p.title)}</a></h3>
    <div class="meta">${escapeHTML(String(year))} · ${escapeHTML(author)}</div>
    <div class="summary">${escapeHTML((p.abstract || "").slice(0, 3000))}</div>
    <div class="actions">
      <button data-l="relevant">Mark relevant</button>
      <button data-l="irrelevant">Mark irrelevant (collapse)</button>
      <button data-l="unsure">Mark unsure</button>
      <button data-a="deep-verify">Deep Verify</button>
    </div>
    <div class="deep-result"></div>
  `;
  el.querySelectorAll("button[data-l]").forEach(btn => {
    btn.onclick = async () => {
      const label = btn.getAttribute("data-l");
      await post("/api/labels/main", { paperId: p.id, label });
      if (label === "irrelevant") {
        collapsed.add(String(p.id));
        el.classList.add("collapsed");
      } else {
        collapsed.delete(String(p.id));
        el.classList.remove("collapsed");
      }
      saveCollapsed();
    };
  });
  bindDeepVerify(el, p.id);
  renderDeepState(el, p.id);
  return el;
}

function cardForPending(p) {
  const el = document.createElement("div");
  el.className = "paper";
  const author = p.firstAuthor || "Unknown author";
  const year = p.year || "Unknown year";
  const href = p.url || "#";
  el.innerHTML = `
    <h3><a href="${escapeAttr(href)}" target="_blank" rel="noopener noreferrer">${escapeHTML(p.title)}</a></h3>
    <div class="meta">${escapeHTML(String(year))} · ${escapeHTML(author)}</div>
    <div class="summary">${escapeHTML((p.abstract || "").slice(0, 3000))}</div>
    <div class="meta">LLM status: pending/failed${p.lastError ? (" · " + escapeHTML(p.lastError)) : ""}</div>
    <div class="actions">
      <button data-a="resolve-true">Resolve relevant</button>
      <button data-a="resolve-false">Resolve irrelevant</button>
      <button data-a="retry">Retry with LLM</button>
      <button data-a="deep-verify">Deep Verify</button>
    </div>
    <div class="deep-result"></div>
  `;
  el.querySelector("button[data-a='resolve-true']").onclick = async () => {
    await post("/api/pending/resolve", { paperId: p.id, relevant: true });
    await reload();
  };
  el.querySelector("button[data-a='resolve-false']").onclick = async () => {
    await post("/api/pending/resolve", { paperId: p.id, relevant: false });
    await reload();
  };
  el.querySelector("button[data-a='retry']").onclick = async () => {
    await post("/api/pending/retry", { paperId: p.id });
    await reload();
  };
  bindDeepVerify(el, p.id);
  renderDeepState(el, p.id);
  return el;
}

async function reloadDigest() {
  const r = await fetch("/api/digests?lookbackHours=72");
  const data = await r.json();
  digestView.innerHTML = "";
  for (const g of data.groups || []) {
    const panel = document.createElement("div");
    panel.className = "window";
    const st = new Date(g.window.start);
    const en = new Date(g.window.end);
    panel.innerHTML = `<div class="title">${st.toLocaleString()} — ${en.toLocaleString()}</div>`;
    for (const p of (g.items || [])) panel.appendChild(cardForDigest(p));
    digestView.appendChild(panel);
  }
}

async function reloadPending() {
  const r = await fetch("/api/pending");
  const data = await r.json();
  pendingView.innerHTML = "";
  const panel = document.createElement("div");
  panel.className = "window";
  panel.innerHTML = `<div class="title">Pending review</div>`;
  for (const p of (data.items || [])) panel.appendChild(cardForPending(p));
  pendingView.appendChild(panel);
}

async function reload() {
  if (deepVerifyInFlight > 0) {
    return;
  }
  await Promise.all([reloadDigest(), reloadPending()]);
  if (!feedsPanel.classList.contains("hidden")) {
    await reloadFeeds();
  }
}

function bindDeepVerify(el, paperId) {
  const btn = el.querySelector("button[data-a='deep-verify']");
  const out = el.querySelector(".deep-result");
  if (!btn || !out) return;
  btn.onclick = async () => {
    const state = deepState.get(paperId);
    if (state && state.status === "running") return;
    deepState.set(paperId, { status: "running", message: "Deep verifying..." });
    deepVerifyInFlight++;
    renderDeepState(el, paperId);
    try {
      const res = await post(`/api/papers/${paperId}/deep-verify`, {});
      deepState.set(paperId, {
        status: "done",
        message: `Deep Verify: ${res.useful ? "useful" : "not useful"}${res.reason ? (" — " + res.reason) : ""}`
      });
    } catch (e) {
      deepState.set(paperId, {
        status: "error",
        message: `Deep Verify failed: ${String(e.message || e)}`
      });
    } finally {
      if (deepVerifyInFlight > 0) deepVerifyInFlight--;
      renderDeepState(el, paperId);
    }
  };
}

function renderDeepState(el, paperId) {
  const out = el.querySelector(".deep-result");
  const btn = el.querySelector("button[data-a='deep-verify']");
  if (!out || !btn) return;
  const state = deepState.get(paperId);
  if (!state || state.status === "idle") {
    out.textContent = "";
    btn.disabled = false;
    return;
  }
  out.textContent = state.message || "";
  btn.disabled = state.status === "running";
}

async function reloadFeeds() {
  const r = await fetch("/api/rss-feeds");
  const data = await r.json();
  feedsList.innerHTML = "";
  for (const f of (data.items || [])) {
    const li = document.createElement("li");
    li.textContent = f.url + (f.enabled ? "" : " (disabled)");
    feedsList.appendChild(li);
  }
  if ((data.items || []).length === 0) {
    const li = document.createElement("li");
    li.textContent = "No RSS feeds configured.";
    feedsList.appendChild(li);
  }
}

function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));
}

function escapeAttr(s) {
  return escapeHTML(s);
}

function toDateInput(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

reload();
setInterval(() => {
  if (deepVerifyInFlight === 0) {
    reload();
  }
}, 60000);
</script>
</body>
</html>
