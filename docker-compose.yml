services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: papers
      POSTGRES_USER: papers
      POSTGRES_PASSWORD: papers
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U papers -d papers"]
      interval: 5s
      timeout: 5s
      retries: 20

  ollama:
    image: ollama/ollama:latest
    gpus: all
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ollama:/root/.ollama

  dedup:
    build: .
    command: ["/app/dedup"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://papers:papers@postgres:5432/papers?sslmode=disable
      LISTEN: :9001
      KEYWORD_ADDR: keyword:9002
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9001"]
      interval: 5s
      timeout: 5s
      retries: 20

  keyword:
    build: .
    command: ["/app/keyword"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      dedup:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://papers:papers@postgres:5432/papers?sslmode=disable
      LISTEN: :9002
      PIPELINE_ADDR: pipeline:9003
      KEYWORDS_FILE: /config/keywords.txt
      NEGATIVE_TITLE_KEYWORDS: gaussian,splatt
    volumes:
      - ./config:/config:ro
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9002"]
      interval: 5s
      timeout: 5s
      retries: 20

  pipeline:
    build: .
    command: ["/app/pipeline"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      DATABASE_URL: postgres://papers:papers@postgres:5432/papers?sslmode=disable
      LISTEN: :9003
      OLLAMA_BASE_URL: http://ollama:11434
      EMBED_MODEL: nomic-embed-text
      CHAT_MODEL: llama3.2:1b
      SHADOW_THRESHOLD: "0.75"
      SHADOW_NEGATIVE_BIAS: "0.05"
      LLM_MAX_ATTEMPTS: "3"
      SEEDS_POSITIVE_FILE: /config/seeds_positive.txt
      SEEDS_NEGATIVE_FILE: /config/seeds_negative.txt
    volumes:
      - ./config:/config:ro
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9003"]
      interval: 5s
      timeout: 5s
      retries: 20

  arxiv-watcher:
    build: .
    command: ["/app/arxiv-watcher"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      dedup:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://papers:papers@postgres:5432/papers?sslmode=disable
      DEDUP_ADDR: dedup:9001
      ARXIV_QUERY: search_query=cat:cs.GR&sortBy=submittedDate&sortOrder=descending&start=0&max_results=200
      ARXIV_POLL: 2m

  rss-watcher:
    build: .
    command: ["/app/rss-watcher"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      dedup:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://papers:papers@postgres:5432/papers?sslmode=disable
      DEDUP_ADDR: dedup:9001
      RSS_FEEDS: https://export.arxiv.org/rss/cs.GR
      RSS_POLL: 3m

  api:
    build: .
    command: ["/app/api"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      pipeline:
        condition: service_started
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      DATABASE_URL: postgres://papers:papers@postgres:5432/papers?sslmode=disable
      LISTEN: :8080
      PDF_STORAGE_DIR: /data/pdfs
      PDF_MAX_SERVE_BYTES: "100000000"
      PDF_RATE_LIMIT_PER_MIN: "60"
      COOKIE_SECURE: "false"
    volumes:
      - ./config:/config
      - pdfdata:/data

  worker:
    build: .
    command: ["/app/worker"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://papers:papers@postgres:5432/papers?sslmode=disable
      PDF_STORAGE_DIR: /data/pdfs
      PDF_DOWNLOAD_MAX_BYTES: "200000000"
    volumes:
      - pdfdata:/data

volumes:
  pgdata:
  ollama:
  pdfdata:
